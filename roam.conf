# /etc/sysconfig/roam
#
# Configuration for roam — Read-Only Access Mode shell.
#
# Security: This file must be owned by root and not group/world-writable.

# System user for the read-only shell.
# Create with: useradd -r -m -s /sbin/nologin roam
ROAM_USER="roam"

# Writable path exceptions (space-separated).
# These paths get full read+write access inside the Landlock sandbox.
# The user's home directory ($HOME of ROAM_USER) is ALWAYS added
# automatically — do not list it here.
#
# Since roam runs as a non-privileged user, POSIX permissions already
# prevent writes to root-owned paths. Making virtual/pseudo filesystems
# writable here avoids edge cases (e.g. /dev/null, /dev/tty, /dev/pts,
# /proc/self, /dev/shm) without reducing security.
#
# /dev   — device nodes, /dev/null, /dev/tty, /dev/shm (POSIX-protected)
# /proc  — procfs, some tools write to /proc/self/* (POSIX-protected)
# /sys   — sysfs (POSIX-protected, needs CAP_SYS_ADMIN for writes)
# /run   — runtime data, tmpfs (POSIX-protected)
# /tmp   — many tools need temp files (less, sort, diff, man, etc.)
ROAM_WRITABLE="/dev /proc /sys /run /tmp"

# Shell override (optional).
# Default: /bin/bash
# The roam user typically has /sbin/nologin as its login shell,
# so this setting (or the default) determines the actual shell.
# ROAM_SHELL="/bin/bash"
